services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"

  redis:
    image: redis:7
#    ports:
#      - "6379:6379"

  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

  celery_worker:
    build: .
    command: celery -A app.workers.celery_app worker -l INFO
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_beat:
    build: .
    command: celery -A app.workers.celery_app beat -l INFO
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tg_bot:
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    build: .
    command: python -m app.tg.bot
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

volumes:
  pg_data:
