<!-- source_edit.html -->
{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-header">
    <div class="muted">✏️ Source #{{ source.id }}</div>
  </div>
  <form method="post" action="/sources/{{ source.id }}/update">
    <div class="row" style="margin-bottom: 1rem;">
      <input name="name" value="{{ source.name }}" style="flex: 2;" required>
      <select name="type" style="width: auto;">
        <option value="rss" {% if source.type.value=='rss' %}selected{% endif %}>rss</option>
        <option value="html" {% if source.type.value=='html' %}selected{% endif %}>html</option>
      </select>
      <label style="display: flex; align-items: center; gap: 0.3rem; margin:0;">
        <input type="checkbox" name="enabled" value="1" {% if source.enabled %}checked{% endif %}>
        enabled
      </label>
    </div>

    <div style="margin-bottom: 1rem;">
      <div class="muted">🌐 URL</div>
      <input name="url" value="{{ source.url }}" required>
    </div>

    <div style="margin-bottom: 1rem;">
      <div class="muted">⚙️ parser_config (JSON)</div>
      <textarea name="parser_config" rows="6" style="font-family: monospace;">{{ parser_config_json }}</textarea>
      <div class="muted" style="margin-top: 0.5rem;">
        Example: <code>{"include": ["театр","премьера"], "exclude": ["вакан"], "max_items": 20}</code>
      </div>
    </div>

    {% if error %}
      <div class="alert-error">{{ error }}</div>
    {% endif %}

    <div class="row">
      <button class="btn btn-primary" type="submit">💾 Save changes</button>
      <a class="btn btn-outline" href="/sources">← Back to sources</a>
      <a class="btn btn-outline" href="{{ source.url }}" target="_blank">🔗 Open URL</a>
    </div>
  </form>
</div>
{% endblock %}
