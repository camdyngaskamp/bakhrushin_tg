<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Bakhrushin News Moderation</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 20px; }
      a { color: #0b57d0; text-decoration: none; }
      .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin: 12px 0; }
      .muted { color: #666; font-size: 13px; }
      textarea { width: 100%; min-height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .btn { padding: 8px 12px; border-radius: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
      .btn-primary { border-color: #0b57d0; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; background:#f1f3f4; font-size: 12px; }
      input { padding: 7px 10px; border-radius: 10px; border: 1px solid #ccc; }
    </style>
  </head>
  <body>
    <h2><a href="/">Bakhrushin Museum News — Moderation</a></h2>
    <div class="muted" style="margin-bottom: 8px;">Publish language: {{ publish_language_label }}</div>
    <div class="row" style="margin: 10px 0 18px 0;">
      <a class="btn" href="/">Posts</a>
      <a class="btn" href="/sources">Sources</a>
      <span class="pill">Language: {{ publish_language_label }}</span>
      {% if web_password_set %}
      <form method="post" action="/logout" style="display:inline;">
        <button type="submit" class="btn">Выход</button>
      </form>
      {% endif %}
    </div>
    {% block content %}{% endblock %}
  </body>
</html>
