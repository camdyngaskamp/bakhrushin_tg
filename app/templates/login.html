<!-- login.html -->
{% extends "base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 2rem auto;">
  <div class="card" style="text-align: left;">
    <div style="margin-bottom: 1rem;">
      <h3 style="font-weight: 600;">🔐 Sign in</h3>
      <p class="muted">Enter moderation password</p>
    </div>

    {% if error %}
      <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div style="margin-bottom: 1rem;">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" required autofocus>
      </div>
      <input type="hidden" name="next" value="{{ next_path or '/' }}">
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">→ Log in</button>
    </form>
  </div>
</div>
{% endblock %}
